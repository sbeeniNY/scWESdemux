# Snakemake 8 cluster profile for LSF (bsub).
# Part 2 only (VCF consensus + merge + Souporcell). Part 1 (sarek) uses its own Nextflow config.
# Edit the LSF project (-P) and queue to match your site, or adapt to another scheduler.

executor: cluster-generic

cluster-generic-submit-cmd: >-
  mkdir -p logs/lsf/{rule} &&
  bash cluster/lsf_submit.sh
  -P acc_YourProject
  -q {resources.queue}
  -n {threads}
  -W {resources.walltime}
  -R "rusage[mem={resources.mem_mb_per_cpu}]"
  -R "span[hosts=1]"
  -J "smk.{rule}.{wildcards}"
  -oo "logs/lsf/{rule}/%J.o"
  -eo "logs/lsf/{rule}/%J.e"

cluster-generic-status-cmd: "bash cluster/lsf_status.sh"
cluster-generic-cancel-cmd: "bkill"
seconds-between-status-checks: 10

default-resources:
  queue: "'premium'"
  walltime: "'04:00'"
  mem_mb_per_cpu: 4000

set-resources:
  per_sample_consensus:
    mem_mb_per_cpu: 8000
    walltime: "'04:00'"
  merge_consensus_vcfs:
    mem_mb_per_cpu: 8000
    walltime: "'04:00'"
  filter_pass:
    walltime: "'02:00'"
  subset_pool_donor_vcf:
    walltime: "'01:00'"
  souporcell:
    mem_mb_per_cpu: 16000
    walltime: "'24:00'"
  demux_summary:
    walltime: "'00:30'"

jobs: 20
rerun-incomplete: true
keep-going: true
printshellcmds: true
latency-wait: 120
retries: 1
